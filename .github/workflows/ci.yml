name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Install DuckDB
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.3.0/duckdb_cli-linux-amd64.zip -o duckdb.zip
          unzip -o duckdb.zip
          sudo mv duckdb /usr/local/bin/
          duckdb --version

      - name: Verify (DuckDB comparison)
        run: make verify

  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Stress tests (quick)
        run: |
          cd stress
          go build -o stress-harness .
          ./stress-harness --folddb ../folddb --scenarios "sustained/passthrough|adversarial/high_card|adversarial/schema_drift|boundary/large_orderby"
