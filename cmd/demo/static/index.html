<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBSPA Demo</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    background: var(--surface);
  }

  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  header .tagline { font-size: 13px; color: var(--text-dim); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  /* Example cards */
  .example {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }

  .example:hover { border-color: var(--accent); }

  .example-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .example-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
  }

  .example-tags {
    display: flex;
    gap: 4px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .tag.cdc { color: var(--yellow); background: rgba(210, 153, 34, 0.15); }
  .tag.window { color: var(--accent); background: rgba(88, 166, 255, 0.15); }

  .example-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .example textarea {
    width: 100%;
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    resize: vertical;
    min-height: 48px;
    line-height: 1.4;
    tab-size: 2;
  }

  .example textarea:focus { outline: none; border-color: var(--accent); }

  .example-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .stream-select {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
  }

  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { filter: brightness(1.1); }
  .btn:active { transform: scale(0.97); }
  .btn-run { background: var(--green); color: var(--bg); }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-sm { font-size: 11px; padding: 4px 10px; }

  /* Output panel */
  .output-bar {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
    font-size: 12px;
  }

  .output-bar .stats {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
  }

  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    font-family: var(--mono);
  }

  .badge-run { background: rgba(63, 185, 80, 0.2); color: var(--green); }
  .badge-stop { background: rgba(248, 81, 73, 0.2); color: var(--red); }

  #output-area {
    flex: 1;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    background: var(--bg);
    padding: 0;
  }

  /* Scrolling lines mode */
  #output-lines {
    padding: 8px 12px;
  }

  .line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
  .line-insert { color: var(--green); }
  .line-retract { color: var(--red); opacity: 0.5; }

  /* Table mode */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 11px;
  }

  .result-table th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-dim);
    font-weight: 600;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .result-table td {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
  }

  .result-table tr.updated td {
    background: rgba(63, 185, 80, 0.08);
    transition: background 0.6s;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Mobile responsive */
  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .panel:first-child {
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .panel:last-child { border-right: none; }
    header { padding: 10px 12px; }
    header .tagline { display: none; }
  }

  @media (max-width: 500px) {
    .example-footer { flex-direction: column; align-items: stretch; gap: 6px; }
    .example textarea { font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>DBSPA</h1>
  <span class="tagline">Streaming SQL with incremental aggregation</span>
</header>

<div class="layout">
  <!-- Queries Panel -->
  <div class="panel">
    <div class="panel-header">
      Example Queries
    </div>
    <div class="panel-body" id="queries-panel"></div>
  </div>

  <!-- Output Panel -->
  <div class="panel">
    <div class="panel-header">
      Output
      <div style="display:flex;gap:8px;align-items:center;">
        <label style="font-size:11px;color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" id="raw-toggle" style="accent-color:var(--accent)"> Raw
        </label>
        <button class="btn btn-stop btn-sm" id="stop-btn" style="display:none" onclick="stopQuery()">Stop</button>
      </div>
    </div>
    <div class="output-bar">
      <span class="stats" id="stats">Ready</span>
    </div>
    <div id="output-area">
      <div class="empty-state">Pick a query and click Run</div>
    </div>
  </div>
</div>

<script>
const EXAMPLES = [
  {
    title: "Filter API errors",
    desc: "Stream only 4xx/5xx responses",
    tags: ["filter"],
    stream: "api_metrics",
    sql: "SELECT timestamp, endpoint, status_code, latency_ms\nWHERE status_code >= 400",
    acc: false,
  },
  {
    title: "Orders by status (CDC)",
    desc: "Live count per order status with Debezium retractions",
    tags: ["cdc", "group by"],
    stream: "ecommerce_orders",
    sql: "SELECT _after->>'status' AS status, COUNT(*) AS count\nGROUP BY _after->>'status'\nFORMAT DEBEZIUM",
    acc: true,
  },
  {
    title: "API latency (windowed)",
    desc: "1-minute tumbling windows over event time",
    tags: ["window"],
    stream: "api_metrics",
    sql: "SELECT window_start, endpoint,\n       COUNT(*) AS reqs,\n       AVG(latency_ms) AS avg_lat\nGROUP BY endpoint\nWINDOW TUMBLING '1 minute'\nEVENT TIME BY timestamp",
    acc: true,
  },
  {
    title: "Revenue by region (CDC)",
    desc: "Running SUM over Debezium change events",
    tags: ["cdc", "group by"],
    stream: "ecommerce_orders",
    sql: "SELECT _after->>'region' AS region,\n       SUM((_after->>'amount')::float) AS revenue\nWHERE _op IN ('c', 'u')\nGROUP BY _after->>'region'\nFORMAT DEBEZIUM",
    acc: true,
  },
  {
    title: "Top pages",
    desc: "Unique visitors and total actions per page",
    tags: ["group by"],
    stream: "clickstream",
    sql: "SELECT page,\n       COUNT(DISTINCT user_id) AS uniq_visitors,\n       COUNT(*) AS total\nGROUP BY page",
    acc: true,
  },
  {
    title: "Error rate per endpoint",
    desc: "Total requests vs errors using CASE",
    tags: ["group by"],
    stream: "api_metrics",
    sql: "SELECT endpoint,\n       COUNT(*) AS total,\n       SUM(CASE WHEN status_code >= 400\n           THEN 1 ELSE 0 END) AS errors\nGROUP BY endpoint",
    acc: true,
  },
];

// State
let reader = null;
let recCount = 0;
let t0 = null;
let isAcc = false;
let accState = new Map();
let accCols = null;
let outputEl, linesEl, statsEl, stopBtn;
let pendingRender = false;
let lineBuffer = [];
const MAX_LINES = 300;

function init() {
  outputEl = document.getElementById('output-area');
  statsEl = document.getElementById('stats');
  stopBtn = document.getElementById('stop-btn');

  const panel = document.getElementById('queries-panel');
  panel.innerHTML = EXAMPLES.map((ex, i) => {
    const tags = ex.tags.map(t => {
      const cls = t === 'cdc' ? 'tag cdc' : t === 'window' ? 'tag window' : 'tag';
      return `<span class="${cls}">${t}</span>`;
    }).join('');
    const rows = ex.sql.split('\n').length + 1;
    return `<div class="example" id="ex-${i}">
      <div class="example-header">
        <span class="example-title">${ex.title}</span>
        <div class="example-tags">${tags}</div>
      </div>
      <div class="example-desc">${ex.desc}</div>
      <textarea id="sql-${i}" rows="${rows}">${ex.sql}</textarea>
      <div class="example-footer">
        <select class="stream-select" id="stream-${i}">
          <option value="ecommerce_orders" ${ex.stream==='ecommerce_orders'?'selected':''}>ecommerce_orders</option>
          <option value="api_metrics" ${ex.stream==='api_metrics'?'selected':''}>api_metrics</option>
          <option value="clickstream" ${ex.stream==='clickstream'?'selected':''}>clickstream</option>
        </select>
        <button class="btn btn-run" onclick="run(${i})">Run</button>
      </div>
    </div>`;
  }).join('');
}

async function run(idx) {
  stopQuery();
  const sql = document.getElementById(`sql-${idx}`).value.trim();
  const stream = document.getElementById(`stream-${idx}`).value;
  isAcc = EXAMPLES[idx].acc;

  // Reset
  recCount = 0;
  t0 = performance.now();
  accState = new Map();
  accCols = null;
  lineBuffer = [];

  // Highlight active example
  document.querySelectorAll('.example').forEach(e => e.style.borderColor = '');
  document.getElementById(`ex-${idx}`).style.borderColor = 'var(--accent)';

  outputEl.innerHTML = '';
  stopBtn.style.display = 'inline-block';
  updateStats();

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stream, sql }),
    });

    if (!resp.ok) {
      const msg = await resp.text();
      outputEl.innerHTML = `<div class="empty-state" style="color:var(--red)">${esc(msg)}</div>`;
      return;
    }

    reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    // Set up output container
    if (!isAcc || document.getElementById('raw-toggle').checked) {
      linesEl = document.createElement('div');
      linesEl.id = 'output-lines';
      outputEl.appendChild(linesEl);
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n');
      buf = parts.pop();

      for (const part of parts) {
        if (part.startsWith('data: ')) {
          handleRecord(part.slice(6));
        } else if (part.startsWith('event: done')) {
          onEnd();
          return;
        }
      }
    }
    onEnd();
  } catch (e) {
    if (e.name !== 'AbortError') {
      outputEl.innerHTML = `<div class="empty-state" style="color:var(--red)">${esc(e.message)}</div>`;
    }
  }
}

function handleRecord(data) {
  recCount++;
  const raw = document.getElementById('raw-toggle').checked;

  if (!isAcc || raw) {
    // Scrolling lines — batch DOM updates
    lineBuffer.push(data);
    if (!pendingRender) {
      pendingRender = true;
      requestAnimationFrame(flushLines);
    }
  } else {
    // Accumulating table — update state, batch render
    try {
      const obj = JSON.parse(data);
      const weight = obj._weight || 1;

      if (!accCols) {
        accCols = Object.keys(obj).filter(k => k !== '_weight');
      }

      // Build key from string-valued columns
      const keyCols = accCols.filter(c => typeof obj[c] === 'string');
      const key = keyCols.length > 0 ? keyCols.map(c => obj[c]).join('\0') : JSON.stringify(obj);

      if (weight < 0) {
        accState.delete(key);
      } else {
        accState.set(key, { data: obj, fresh: true });
      }

      if (!pendingRender) {
        pendingRender = true;
        requestAnimationFrame(renderTable);
      }
    } catch {}
  }

  // Update stats every 50 records instead of every record
  if (recCount % 50 === 0) updateStats();
}

function flushLines() {
  pendingRender = false;
  if (!linesEl || lineBuffer.length === 0) return;

  const frag = document.createDocumentFragment();
  for (const data of lineBuffer) {
    const div = document.createElement('div');
    div.className = 'line';
    try {
      const obj = JSON.parse(data);
      if (obj._weight > 0) { div.className = 'line line-insert'; }
      else if (obj._weight < 0) { div.className = 'line line-retract'; }
    } catch {}
    div.textContent = data;
    frag.appendChild(div);
  }
  lineBuffer = [];
  linesEl.appendChild(frag);

  // Trim old lines
  while (linesEl.childElementCount > MAX_LINES) {
    linesEl.removeChild(linesEl.firstChild);
  }

  outputEl.scrollTop = outputEl.scrollHeight;
}

function renderTable() {
  pendingRender = false;
  if (!accCols) return;

  const rows = Array.from(accState.values());
  if (rows.length === 0) {
    outputEl.innerHTML = '<div class="empty-state">Waiting for data...</div>';
    return;
  }

  // Build table via string concat (much faster than DOM manipulation)
  const parts = ['<table class="result-table"><thead><tr>'];
  for (const col of accCols) {
    parts.push(`<th>${esc(col)}</th>`);
  }
  parts.push('</tr></thead><tbody>');

  for (const row of rows) {
    const cls = row.fresh ? ' class="updated"' : '';
    row.fresh = false;
    parts.push(`<tr${cls}>`);
    for (const col of accCols) {
      let v = row.data[col];
      if (typeof v === 'number' && !Number.isInteger(v)) v = v.toFixed(2);
      parts.push(`<td>${esc(String(v ?? ''))}</td>`);
    }
    parts.push('</tr>');
  }
  parts.push('</tbody></table>');
  outputEl.innerHTML = parts.join('');

  // Clear updated highlight after animation
  setTimeout(() => {
    outputEl.querySelectorAll('tr.updated').forEach(tr => tr.classList.remove('updated'));
  }, 600);
}

function updateStats() {
  const elapsed = t0 ? ((performance.now() - t0) / 1000).toFixed(1) : '0.0';
  const rps = t0 && elapsed > 0 ? Math.round(recCount / elapsed) : 0;
  statsEl.innerHTML = `<span class="badge badge-run">LIVE</span> ${recCount.toLocaleString()} records &middot; ${elapsed}s &middot; ${rps}/s`;
}

function onEnd() {
  const elapsed = t0 ? ((performance.now() - t0) / 1000).toFixed(1) : '0.0';
  statsEl.innerHTML = `<span class="badge badge-stop">DONE</span> ${recCount.toLocaleString()} records &middot; ${elapsed}s`;
  stopBtn.style.display = 'none';
  document.querySelectorAll('.example').forEach(e => e.style.borderColor = '');
}

function stopQuery() {
  if (reader) { reader.cancel(); reader = null; }
  fetch('/api/stop', { method: 'POST' }).catch(() => {});
  onEnd();
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('raw-toggle').addEventListener('change', () => {
  if (reader && isAcc) {
    outputEl.innerHTML = '';
    if (document.getElementById('raw-toggle').checked) {
      linesEl = document.createElement('div');
      linesEl.id = 'output-lines';
      outputEl.appendChild(linesEl);
    } else {
      linesEl = null;
      renderTable();
    }
  }
});

init();
</script>
</body>
</html>
